site: kinostar86.ru
task_family: cinema_lookup
cases:
  # Задача пользователя
  - case_id: kino-01
    task: "Зайди на https://kinostar86.ru/ и найди сеансы фильма Петрошка на 27 апреля. Есть ли свободные места на самый ранний сеанс?"

  # Текущая афиша
  - case_id: kino-02
    task: "Зайди на https://kinostar86.ru/ и скажи какие фильмы сейчас идут в кинотеатре. Перечисли все названия."

  # Детские фильмы
  - case_id: kino-03
    task: "Зайди на https://kinostar86.ru/ и найди все фильмы с возрастным рейтингом 0+ или 6+ на этой неделе."

  # Конкретный фильм — цена
  - case_id: kino-04
    task: "Зайди на https://kinostar86.ru/ и узнай стоимость билетов на фильм Супер Марио: Галактическое кино."

  # Свободные места на вечерний сеанс
  - case_id: kino-05
    task: "Зайди на https://kinostar86.ru/ и найди ближайший вечерний сеанс фильма Ангелы Ладоги. Есть ли там свободные места?"

  # Скоро в кино
  - case_id: kino-06
    task: "Зайди на https://kinostar86.ru/ и перечисли все фильмы из раздела Скоро в кино."

  # Контакты
  - case_id: kino-07
    task: "Зайди на https://kinostar86.ru/ и найди контактную информацию кинотеатра: адрес, телефон, режим работы."

  # Пушкинская карта
  - case_id: kino-08
    task: "Зайди на https://kinostar86.ru/ и найди сеансы доступные по Пушкинской карте на ближайшие дни."

  # Расписание на конкретный день
  - case_id: kino-09
    task: "Зайди на https://kinostar86.ru/ и покажи полное расписание всех сеансов на 28 апреля."

  # Ближайший сеанс
  - case_id: kino-10
    task: "Зайди на https://kinostar86.ru/ и найди ближайший сеанс фильма Родительский дом. Когда он начинается и сколько стоит билет?"
